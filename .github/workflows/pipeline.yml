name: Lol-data-project-pipeline
on:
  schedule:
    - cron: '0 3 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Google Cloud Authentication
      run: echo "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}" > google-key.json
    
    - name: Run the pipeline
      env:
        RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        RIOT_PUUID: ${{ secrets.RIOT_PUUID }}
        PLAYER_NAME: ${{ secrets.PLAYER_NAME }}
        GOOGLE_APPLICATION_CREDENTIALS: "google-key.json"
      run: |
        python pipeline_bq.py
    

    
    
    
     
